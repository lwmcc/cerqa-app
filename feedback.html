<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Cerqa</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  margin: 0;
  background: #f0f4f8;
  color: #1b2d4a;
}

/* ── HERO ── */
.hero {
  background: linear-gradient(160deg, #1b2d4a 0%, #2e5280 100%);
  color: white;
  text-align: center;
  padding: 64px 20px 48px;
}

.hero h1 {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -1.5px;
  margin: 0 0 12px;
  line-height: 1;
}

.hero p {
  font-size: 17px;
  opacity: 0.75;
  margin: 0;
}

/* ── FORM SECTION ── */
.form-section {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 20px 64px;
}

.form-wrapper {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  overflow: hidden;
}

.form-wrapper iframe {
  display: block;
  width: 100%;
  border: none;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 36px 20px;
  font-size: 14px;
  color: #8a97a8;
  background: #f0f4f8;
  border-top: 1px solid #e2e8f0;
}

footer p {
  margin: 0 0 10px;
}

footer a {
  margin: 0 12px;
  color: #4a6fa5;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <a href="/" style="display:inline-block; font-size:28px; font-weight:700; color:white; text-decoration:none; margin-bottom:20px; letter-spacing:-0.5px;">Cerqa</a>
  <h1>Share Your Feedback</h1>
  <p>Help us improve — we read every response.</p>
</header>

<!-- FORM -->
<div class="form-section">
  <div class="form-wrapper">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSfJg9I1lnIqzfTRQ03OFTRRFhHk2HEPn_MI8rSWJfevvCXZeQ/viewform?embedded=true"
      height="900"
      title="Cerqa Feedback Form">
      Loading form…
    </iframe>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Cerqa</p>
  <a href="/">Home</a>
  <a href="/privacy">Privacy Policy</a>
  <a href="/terms">Terms of Service</a>
</footer>

</body>
</html>
